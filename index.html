<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Money Trucks</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #1a1a1a;
            --text-main: #ffffff;
            --accent-gold: #ffcc00;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* --- HEADER --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: linear-gradient(to bottom, #111, transparent);
        }

        .user-info { display: flex; align-items: center; gap: 8px; }
        .balance { color: var(--accent-gold); font-weight: bold; font-size: 1.1em; }
        .day-night-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; }

    #game-stage {
    width: 100%;
    height: 350px;
    position: relative;
    background-color: #050505;
    overflow: hidden; /* Hides the road tiles waiting outside the screen */
    display: flex;
    justify-content: center;
    align-items: center;
}

#road-loader {
    display: flex;
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    width: 500%; 
    animation: scrollHighway 12s linear infinite;
    /* This ensures no gaps between tiles if the crop was slightly short */
    gap: -1px; 
}

.tile {
    flex: 1; /* Ensures each tile takes exactly 20% of the 500% width */
    height: 100%;
    /* 'contain' ensures the whole road shows, 'cover' might crop the top/bottom */
    background-size: 100% 100%; 
    
    /* ADJUST THIS: If the road is too high or low, change the second % (Y-axis) 
       Example: 52% might move it down slightly to align with the next tile */
    background-position: center 50%; 
    background-repeat: no-repeat;
    
    /* This helps hide slight color/edge mismatches from the crop */
    outline: 1px solid #050505; 
}

.tile:nth-child(2){
 background-position: center 52%;
}

@keyframes scrollHighway {
    0% { transform: translateX(0); }
    100% { transform: translateX(-80%); } 
}
#truck {
    position: relative;
    width: 200px;
    z-index: 10;
    margin-top: 60px; /* Adjust to sit the truck on the road lines */
    filter: drop-shadow(0 15px 20px rgba(0,0,0,0.8));
    animation: truckBounce 0.5s ease-in-out infinite alternate;
}

@keyframes truckBounce {
    from { transform: translateY(0); }
    to { transform: translateY(4px); }
}
        /* --- UPGRADES SECTION --- */
        .upgrades-container {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .upgrade-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px 10px;
            text-align: center;
            border: 1px solid #333;
            transition: transform 0.1s;
        }

        .upgrade-card:active { transform: scale(0.95); }
        .upgrade-card span { display: block; font-size: 0.8rem; color: #888; margin-bottom: 5px; }
        .upgrade-card strong { display: block; font-size: 0.9rem; margin-bottom: 10px; }
        .buy-btn {
            background: var(--accent-gold);
            color: #000;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 0.75rem;
        }

        /* --- FOOTER NAV --- */
        .footer-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            background: #111;
            padding: 15px 0;
            border-top: 1px solid #333;
        }

        .nav-item { color: #666; text-decoration: none; font-size: 0.7rem; text-align: center; }
        .nav-item i { display: block; font-size: 1.4rem; margin-bottom: 4px; }
        .nav-item.active { color: var(--accent-gold); }

    </style>
</head>
<body>

    <div class="header">
        <div class="user-info">
            <span id="username">Driver</span>
        </div>
        <div style="display: flex; align-items: center; gap: 15px;">
            <span class="balance" id="balance-display">0 MTC</span>
            <button class="day-night-btn">🌙</button>
        </div>
    </div>

    <div id="game-stage">
    <div id="road-loader">
        <div class="tile" style="background-image: url('images/road_pillars.png');"></div>
        <div class="tile" style="background-image: url('images/road_default.png');"></div>
        <div class="tile" style="background-image: url('images/road_pillars&_trees.png');"></div>
        <div class="tile" style="background-image: url('images/road_default.png');"></div>
        <div class="tile" style="background-image: url('images/road_pillars.png');"></div>
    </div>
    
    <img id="truck" src="images/tier1_pickup(1).png" alt="Truck">
</div>
    <div class="upgrades-container">
        <div class="upgrade-card">
            <span>Fuel Tank</span>
            <strong>LVL <span id="fuel-lvl">1</span></strong>
            <button class="buy-btn" onclick="upgrade('fuel')">20 MTC</button>
        </div>
        <div class="upgrade-card">
            <span>Speed</span>
            <strong>LVL <span id="speed-lvl">1</span></strong>
            <button class="buy-btn" onclick="upgrade('speed')">20 MTC</button>
        </div>
        <div class="upgrade-card">
            <span>Engine</span>
            <strong>LVL <span id="engine-lvl">1</span></strong>
            <button class="buy-btn" onclick="upgrade('engine')">20 MTC</button>
        </div>
    </div>

    <div class="footer-nav">
        <a href="#" class="nav-item">👛<br>Wallet</a>
        <a href="#" class="nav-item active">🛒<br>Store</a>
        <a href="#" class="nav-item">👥<br>Friends</a>
        <a href="#" class="nav-item">📋<br>Tasks</a>
    </div>
    <script>
      const tg = window.Telegram.WebApp;
const NGROK_URL = " https://merlin-superindifferent-karma.ngrok-free.dev"; // e.g., https://a1b2.ngrok-free.app

// Setup UI
        tg.expand();
        document.getElementById('username').innerText = tg.initDataUnsafe.user?.username || "Guest Driver";

        function upgrade(statName) {
            const userId = tg.initDataUnsafe.user?.id || 12345;
            
            fetch(`${NGROK_URL}/upgrade`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: userId, stat: statName })
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === "success") {
                    tg.showConfirm(data.message);
                    // In a real version, we would refresh the levels here
                }
            })
            .catch(err => tg.showAlert("Engine Error: Check Connection"));
        }
    </script>
</body>
</html>
