<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Money Trucks</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #1a1a1a;
            --text-main: #ffffff;
            --accent-gold: #ffcc00;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* --- HEADER --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: linear-gradient(to bottom, #111, transparent);
        }

        .user-info { display: flex; align-items: center; gap: 8px; }
        .balance { color: var(--accent-gold); font-weight: bold; font-size: 1.1em; }
        .day-night-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; }

   #game-stage {
    width: 100%;
    height: 350px;
    position: relative;
    background-color: #050505;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    border-bottom: 2px solid #1a1a1a;
}

#road-video, #stagnant-truck {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    z-index: 1;
}

/* HUD Overlay Styling */
#hud-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 5;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 15px;
    box-sizing: border-box;
    pointer-events: none; /* Allows clicking through to game components if needed */
}

.hud-top {
    display: flex;
    justify-content: space-between;
    width: 100%;
}

#hud-speed, #hud-timer {
    background: rgba(5, 5, 5, 0.75);
    color: #fff;
    padding: 6px 12px;
    border-radius: 4px;
    font-family: monospace;
    font-size: 14px;
    letter-spacing: 1px;
    border: 1px solid rgba(255, 255, 255, 0.1);
}

/* Uniform Decreasing Fuel Bar */
.fuel-bar-container {
    width: 100%;
    height: 6px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 3px;
    overflow: hidden;
    margin-top: auto;
}

#fuel-bar-fill {
    height: 100%;
    background: #ff3333; /* Crimson/Red alert color */
    width: 100%;
    transition: width 0.5s linear;
}

/* Breakdown Action Overlay */
#breakdown-screen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(5, 5, 5, 0.85);
    z-index: 15;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: #fff;
    padding: 20px;
    box-sizing: border-box;
}

#breakdown-screen p {
    font-size: 16px;
    margin-bottom: 20px;
    line-height: 1.5;
    font-weight: bold;
}

#breakdown-screen button {
    background: #fff;
    color: #050505;
    border: none;
    padding: 12px 30px;
    font-weight: bold;
    border-radius: 4px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    box-shadow: 0 4px 15px rgba(255,255,255,0.2);
}
        /* --- UPGRADES SECTION --- */
        .upgrades-container {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .upgrade-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px 10px;
            text-align: center;
            border: 1px solid #333;
            transition: transform 0.1s;
        }

        .upgrade-card:active { transform: scale(0.95); }
        .upgrade-card span { display: block; font-size: 0.8rem; color: #888; margin-bottom: 5px; }
        .upgrade-card strong { display: block; font-size: 0.9rem; margin-bottom: 10px; }
        .buy-btn {
            background: var(--accent-gold);
            color: #000;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 0.75rem;
        }

        /* --- FOOTER NAV --- */
        .footer-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            background: #111;
            padding: 15px 0;
            border-top: 1px solid #333;
        }

        .nav-item { color: #666; text-decoration: none; font-size: 0.7rem; text-align: center; }
        .nav-item i { display: block; font-size: 1.4rem; margin-bottom: 4px; }
        .nav-item.active { color: var(--accent-gold); }

    </style>
</head>
<body>

    <div class="header">
        <div class="user-info">
            <span id="username">Driver</span>
        </div>
        <div style="display: flex; align-items: center; gap: 15px;">
            <span class="balance" id="balance-display">0 MTC</span>
            <button class="day-night-btn">🌙</button>
        </div>
    </div>

   <div id="game-stage">
    <video id="road-video" autoplay loop muted playsinline style="display: none;">
        <source src="videos/Pickuptruck-loopvideo1.mp4" type="video/mp4">
    </video>

    <img id="stagnant-truck" src="images/stagnant_pickuptruck.jpg" alt="Truck Engine Off">

    <div id="hud-overlay">
        <div class="hud-top">
            <span id="hud-speed">0 m/s</span>
            <span id="hud-timer">Est: 30:00</span>
        </div>
        
        <div class="fuel-bar-container">
            <div id="fuel-bar-fill" style="width: 100%;"></div>
        </div>
    </div>

    <div id="breakdown-screen" style="display: none;">
        <p>Oops! Engine died out.<br>Let's fix it to get this baby going!</p>
        <button onclick="fixEngine()">Pay 5 MTC</button>
    </div>
</div>

<div class="upgrades-container">
    <div class="upgrade-card">
        <span>Fuel Tank</span>
        <strong>LVL <span id="fuel-lvl">0</span></strong>
        <button class="buy-btn" onclick="upgrade('fuel')">20 MTC</button>
    </div>
    <div class="upgrade-card">
        <span>Speed</span>
        <strong>LVL <span id="speed-lvl">0</span></strong>
        <button class="buy-btn" onclick="upgrade('speed')">20 MTC</button>
    </div>
    <div class="upgrade-card">
        <span>Engine</span>
        <strong>LVL <span id="engine-lvl">0</span></strong>
        <button class="buy-btn" onclick="upgrade('engine')">20 MTC</button>
    </div>
</div>

<div class="footer-nav">
    <a href="#" class="nav-item">👛<br>Wallet</a>
    <a href="#" class="nav-item active">🛒<br>Store</a>
    <a href="#" class="nav-item">👥<br>Friends</a>
    <a href="#" class="nav-item">📋<br>Tasks</a>
</div>

<script>
    // --- 1. INITIALIZE TELEGRAM WEB APP ---
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const NGROK_URL = "https://merlin-superindifferent-karma.ngrok-free.dev"; 

    // --- 2. GAME ENGINE STATE VARIABLES ---
    let balance = 70; // Set initial budget to 70 MTC for upgrades + buffer
    let speedsLevel = 0;
    let fuelLevel = 0;
    let engineLevel = 0;

    let totalTaskTime = 1800; // 30 minutes in seconds
    let currentTaskTimeLeft = 1800;
    let fuelPercentage = 100;
    let isDriving = false;
    let gameInterval = null;

    // --- 3. DOM ELEMENT CACHING ---
    const usernameElement = document.getElementById('username');
    const videoEl = document.getElementById('road-video');
    const stagnantEl = document.getElementById('stagnant-truck');
    const breakdownEl = document.getElementById('breakdown-screen');
    const speedHud = document.getElementById('hud-speed');
    const timerHud = document.getElementById('hud-timer');
    const fuelFill = document.getElementById('fuel-bar-fill');
    const balanceTextElement = document.getElementById('balance-display');
        // Force the initial load value to show 70 MTC immediately
        if (balanceTextElement) {
            balanceTextElement.innerText = `${balance} MTC`;
        }

    // UI Level Selectors
    const fuelLvlTxt = document.getElementById('fuel-lvl');
    const speedLvlTxt = document.getElementById('speed-lvl');
    const engineLvlTxt = document.getElementById('engine-lvl');

    // --- 4. HANDLE TELEGRAM USERNAME PARSING ---
    if (usernameElement) {
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            const user = tg.initDataUnsafe.user;
            usernameElement.innerText = user.username ? `@${user.username}` : (user.first_name || "Driver");
        } else {
            usernameElement.innerText = "Guest Driver";
            console.log("Running outside of Telegram. Defaulting to Guest Driver.");
        }
    }

    // --- 5. VISUAL VIEWPORT LOOP HANDLER ---
    function updateGameLoopView() {
        // Condition: Drive ONLY if all three tracking levels are > 0 AND no active engine breakdown screen
        if (speedsLevel > 0 && fuelLevel > 0 && engineLevel > 0 && breakdownEl.style.display === 'none') {
            if (!isDriving) {
                isDriving = true;
                stagnantEl.style.display = 'none';
                videoEl.style.display = 'block';
                videoEl.play().catch(e => console.log("Autoplay context blocked"));
                startCoreTimers();
            }
            // Dynamic scale readout calculation (e.g., Level 1 = 30 m/s)
            speedHud.innerText = `${20 + (speedsLevel * 10)} m/s`;
        } else {
            isDriving = false;
            videoEl.style.display = 'none';
            stagnantEl.style.display = 'block';
            videoEl.pause();
            clearInterval(gameInterval);
            speedHud.innerText = `0 m/s`;
        }
    }

    // --- 6. CORE GAME CONTROLLER METERS ---
    function startCoreTimers() {
        clearInterval(gameInterval);
        
        gameInterval = setInterval(() => {
            if (!isDriving) return;

            // A. Uniform Fuel Depletion (Higher levels deplete fuel slower)
            let fuelBurnRate = 0.5 / fuelLevel; 
            fuelPercentage -= fuelBurnRate;
            if (fuelPercentage <= 0) {
                fuelPercentage = 0;
                isDriving = false;
                updateGameLoopView();
                tg.showAlert("Out of Fuel! Upgrade your Fuel Tank component to keep rolling.");
            }
            fuelFill.style.width = `${fuelPercentage}%`;

            // B. Random Engine Failure Framework (Higher levels drop probability drastically)
            let breakdownChance = 0.01 / engineLevel;
            if (Math.random() < breakdownChance) {
                triggerEngineBreakdown();
                return;
            }

            // C. Task Countdown Timer Calculation
            currentTaskTimeLeft--;
            if (currentTaskTimeLeft <= 0) {
                currentTaskTimeLeft = 0;
                isDriving = false;
                balance += 20; // Task reward payout
                tg.showAlert("Task Finished! Your delivery run earned you 20 MTC.");
                updateGameLoopView();
            }
            
            // Format time counter output into standard MM:SS
            let minutes = Math.floor(currentTaskTimeLeft / 60);
            let seconds = currentTaskTimeLeft % 60;
            timerHud.innerText = `Est: ${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;

        }, 1000);
    }

    function triggerEngineBreakdown() {
        isDriving = false;
        breakdownEl.style.display = 'flex';
        updateGameLoopView();
    }

    // --- 7. REPAIR ENGINE HANDLER ---
    function fixEngine() {
        if (balance >= 5) {
            balance -= 5;
            if (balanceTextElement) {
                balanceTextElement.innerText = `${balance} MTC`;
            }
            breakdownEl.style.display = 'none';
            updateGameLoopView();
        } else {
            tg.showAlert("Insufficient MTC funds to clear the mechanical breakdown!");
        }
    }

    // --- 8. UPGRADE DATA TRANSMISSION PIPELINE ---
    function upgrade(statName) {
        const userId = tg.initDataUnsafe.user?.id || 12345;
        
        fetch(`${NGROK_URL}/upgrade`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_id: userId, stat: statName })
        })
        .then(res => res.json())
        .then(data => {
            if(data.status === "success") {
                tg.showConfirm(data.message);
                
                // Increment levels inside local UI variables upon successful backend return
                if (statName === 'fuel') {
                    fuelLevel++;
                    if(fuelLvlTxt) fuelLvlTxt.innerText = fuelLevel;
                }
                if (statName === 'speed') {
                    speedsLevel++;
                    if(speedLvlTxt) speedLvlTxt.innerText = speedsLevel;
                }
                if (statName === 'engine') {
                    engineLevel++;
                    if(engineLvlTxt) engineLvlTxt.innerText = engineLevel;
                }

                // Deduct cost locally and update the string structure layout
                balance -= 20;
                if (balanceTextElement) {
                    balanceTextElement.innerText = `${balance} MTC`;
                }
                
                updateGameLoopView();
                            }
        })
        .catch(err => tg.showAlert("Engine Error: Check Connection"));
    }
</script>
</body>
</html>
