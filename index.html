<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Money Trucks</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #1a1a1a;
            --text-main: #ffffff;
            --accent-gold: #ffcc00;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* --- HEADER --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: linear-gradient(to bottom, #111, transparent);
        }

        .user-info { display: flex; align-items: center; gap: 8px; }
        .balance { color: var(--accent-gold); font-weight: bold; font-size: 1.1em; }
        .day-night-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; }

   #game-stage {
    width: 100%;
    height: 350px;
    position: relative;
    background-color: #050505;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    border-bottom: 2px solid #1a1a1a;
}

#road-video, #stagnant-truck {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    z-index: 1;
}

/* HUD Overlay Styling */
#hud-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 5;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 15px;
    box-sizing: border-box;
    pointer-events: none; /* Allows clicking through to game components if needed */
}

.hud-top {
    display: flex;
    justify-content: space-between;
    width: 100%;
}

#hud-speed, #hud-timer {
    background: rgba(5, 5, 5, 0.75);
    color: #fff;
    padding: 6px 12px;
    border-radius: 4px;
    font-family: monospace;
    font-size: 14px;
    letter-spacing: 1px;
    border: 1px solid rgba(255, 255, 255, 0.1);
}

/* Uniform Decreasing Fuel Bar */
.fuel-bar-container {
    width: 100%;
    height: 6px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 3px;
    overflow: hidden;
    margin-top: auto;
}

#fuel-bar-fill {
    height: 100%;
    background: #ff3333; /* Crimson/Red alert color */
    width: 100%;
    transition: width 0.5s linear;
}

/* Breakdown Action Overlay */
#breakdown-screen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(5, 5, 5, 0.85);
    z-index: 15;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: #fff;
    padding: 20px;
    box-sizing: border-box;
}

#breakdown-screen p {
    font-size: 16px;
    margin-bottom: 20px;
    line-height: 1.5;
    font-weight: bold;
}

#breakdown-screen button {
    background: #fff;
    color: #050505;
    border: none;
    padding: 12px 30px;
    font-weight: bold;
    border-radius: 4px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    box-shadow: 0 4px 15px rgba(255,255,255,0.2);
}
        /* --- UPGRADES SECTION --- */
        .upgrades-container {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .upgrade-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px 10px;
            text-align: center;
            border: 1px solid #333;
            transition: transform 0.1s;
        }

        .upgrade-card:active { transform: scale(0.95); }
        .upgrade-card span { display: block; font-size: 0.8rem; color: #888; margin-bottom: 5px; }
        .upgrade-card strong { display: block; font-size: 0.9rem; margin-bottom: 10px; }
        .buy-btn {
            background: var(--accent-gold);
            color: #000;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 0.75rem;
        }

        /* --- FOOTER NAV --- */
        .footer-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            background: #111;
            padding: 15px 0;
            border-top: 1px solid #333;
        }

        .nav-item { color: #666; text-decoration: none; font-size: 0.7rem; text-align: center; }
        .nav-item i { display: block; font-size: 1.4rem; margin-bottom: 4px; }
        .nav-item.active { color: var(--accent-gold); }

    </style>
</head>
<body>

    <div class="header">
        <div class="user-info">
            <span id="username">Driver</span>
        </div>
        <div style="display: flex; align-items: center; gap: 15px;">
            <span class="balance" id="balance-display">0 MTC</span>
            <button class="day-night-btn">🌙</button>
        </div>
    </div>

    <div id="game-stage">
    <video id="road-video" autoplay loop muted playsinline style="display: none;">
        <source src="videos/Pickuptruck-loopvideo1.mp4" type="video/mp4">
    </video>

    <img id="stagnant-truck" src="images/stagnant_pickuptruck.png" alt="Truck Engine Off">

    <div id="hud-overlay">
        <div class="hud-top">
            <span id="hud-speed">0 m/s</span>
            <span id="hud-timer">Est: 30:00</span>
        </div>
        
        <div class="fuel-bar-container">
            <div id="fuel-bar-fill" style="width: 100%;"></div>
        </div>
    </div>

    <div id="breakdown-screen" style="display: none;">
        <p>Oops! Engine died out.<br>Let's fix it to get this baby going!</p>
        <button onclick="fixEngine()">Pay 5 MTC</button>
    </div>
</div>
    <div class="upgrades-container">
        <div class="upgrade-card">
            <span>Fuel Tank</span>
            <strong>LVL <span id="fuel-lvl">1</span></strong>
            <button class="buy-btn" onclick="upgrade('fuel')">20 MTC</button>
        </div>
        <div class="upgrade-card">
            <span>Speed</span>
            <strong>LVL <span id="speed-lvl">1</span></strong>
            <button class="buy-btn" onclick="upgrade('speed')">20 MTC</button>
        </div>
        <div class="upgrade-card">
            <span>Engine</span>
            <strong>LVL <span id="engine-lvl">1</span></strong>
            <button class="buy-btn" onclick="upgrade('engine')">20 MTC</button>
        </div>
    </div>

    <div class="footer-nav">
        <a href="#" class="nav-item">👛<br>Wallet</a>
        <a href="#" class="nav-item active">🛒<br>Store</a>
        <a href="#" class="nav-item">👥<br>Friends</a>
        <a href="#" class="nav-item">📋<br>Tasks</a>
    </div>
    
    <script>
    // 1. Initialize Telegram WebApp once right at the start
    const tg = window.Telegram.WebApp;
    
    // Tell Telegram the app is fully ready and expanded
    tg.ready();
    tg.expand();

    // 2. Fix the space in the NGROK URL
    const NGROK_URL = "https://merlin-superindifferent-karma.ngrok-free.dev"; 

    // 3. Handle Username display safely with fallback options
    const usernameElement = document.getElementById('username');
    if (usernameElement) {
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            const user = tg.initDataUnsafe.user;
            // Prioritize username, fall back to first name, then global fallback
            usernameElement.innerText = user.username ? `@${user.username}` : (user.first_name || "Driver");
        } else {
            usernameElement.innerText = "Guest Driver";
            console.log("Running outside of Telegram. Defaulting to Guest Driver.");
        }
    }

    // 4. Upgrade Function
    function upgrade(statName) {
        const userId = tg.initDataUnsafe.user?.id || 12345;
        
        fetch(`${NGROK_URL}/upgrade`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_id: userId, stat: statName })
        })
        .then(res => res.json())
        .then(data => {
            if(data.status === "success") {
                tg.showConfirm(data.message);
                // In a real version, we would refresh the levels here
            }
        })
        .catch(err => tg.showAlert("Engine Error: Check Connection"));
    }
</script>
</body>
</html>
