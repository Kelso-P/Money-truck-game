<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Money Trucks</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #1a1a1a;
            --text-main: #ffffff;
            --accent-gold: #ffcc00;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* --- HEADER --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: linear-gradient(to bottom, #111, transparent);
        }

        .user-info { display: flex; align-items: center; gap: 8px; }
        .balance { color: var(--accent-gold); font-weight: bold; font-size: 1.1em; }
        .day-night-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; }

   #game-stage {
    width: 100%;
    height: 350px;
    position: relative;
    background-color: #050505;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    border-bottom: 2px solid #1a1a1a;
}

#road-video, #stagnant-truck {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    z-index: 1;
}

/* HUD Overlay Styling */
#hud-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 5;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 15px;
    box-sizing: border-box;
    pointer-events: none; /* Allows clicking through to game components if needed */
}

.hud-top {
    display: flex;
    justify-content: space-between;
    width: 100%;
}

#hud-speed, #hud-timer {
    background: rgba(5, 5, 5, 0.75);
    color: #fff;
    padding: 6px 12px;
    border-radius: 4px;
    font-family: monospace;
    font-size: 14px;
    letter-spacing: 1px;
    border: 1px solid rgba(255, 255, 255, 0.1);
}

/* Uniform Decreasing Fuel Bar */
.fuel-bar-container {
    width: 100%;
    height: 6px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 3px;
    overflow: hidden;
    margin-top: auto;
}

#fuel-bar-fill {
    height: 100%;
    background: #ff3333; /* Crimson/Red alert color */
    width: 100%;
    transition: width 0.5s linear;
}

/* Breakdown Action Overlay */
#breakdown-screen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(5, 5, 5, 0.85);
    z-index: 15;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: #fff;
    padding: 20px;
    box-sizing: border-box;
}

#breakdown-screen p {
    font-size: 16px;
    margin-bottom: 20px;
    line-height: 1.5;
    font-weight: bold;
}

#breakdown-screen button {
    background: #fff;
    color: #050505;
    border: none;
    padding: 12px 30px;
    font-weight: bold;
    border-radius: 4px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    box-shadow: 0 4px 15px rgba(255,255,255,0.2);
}
        /* --- UPGRADES SECTION --- */
        .upgrades-container {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .upgrade-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px 10px;
            text-align: center;
            border: 1px solid #333;
            transition: transform 0.1s;
        }

        .upgrade-card:active { transform: scale(0.95); }
        .upgrade-card span { display: block; font-size: 0.8rem; color: #888; margin-bottom: 5px; }
        .upgrade-card strong { display: block; font-size: 0.9rem; margin-bottom: 10px; }
        .buy-btn {
            background: var(--accent-gold);
            color: #000;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 0.75rem;
        }

        .upgrade-card button {
            background: #f39c12 !important;
            color: #000000 !important;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            padding: 8px 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .upgrade-card button:hover {
            background: #e67e22 !important;
        }

        /* --- FOOTER NAV --- */
        .footer-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            background: #111;
            padding: 15px 0;
            border-top: 1px solid #333;
        }

        .nav-item { color: #666; text-decoration: none; font-size: 0.7rem; text-align: center; }
        .nav-item i { display: block; font-size: 1.4rem; margin-bottom: 4px; }
        .nav-item.active { color: var(--accent-gold); }

    </style>
</head>
<body>

   <div class="header">
    <div class="user-info">
        <span id="username">Driver</span>
    </div>
    <div style="display: flex; align-items: center; gap: 15px;">
        <span class="balance" id="balance-display" style="background: #23232e; padding: 6px 12px; border-radius: 20px; border: 1px solid #f39c12; font-weight: bold; font-size: 0.9rem; color: #fff;">0 MTC</span>
    </div>
</div>

   <div id="game-stage" style="position: relative; overflow: hidden; border-radius: 12px;">
        <video id="road-video" autoplay loop muted playsinline style="display: none; width: 100%; height: 100%; object-fit: cover;">
            <source src="videos/Pickuptruck-loopvideo1.mp4" type="video/mp4">
        </video>

        <img id="stagnant-truck" src="images/stagnant_pickuptruck.jpg" alt="Truck Engine Off" style="width: 100%; height: auto; display: block;">

        <div id="job-board-overlay" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); z-index: 500; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; box-sizing: border-box;">
            <h2 style="color: #fff; font-size: 1.2rem; margin-bottom: 15px;">There's another job, let's hit the road!</h2>
            <button id="start-job-btn" onclick="acceptNewJobContract()" style="background: #2ecc71; color: #fff; font-weight: bold; padding: 12px 30px; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">Start Job</button>
        </div>

        <div id="game-modal" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); z-index: 999; justify-content: center; align-items: center; box-sizing: border-box; padding: 15px;">
            <div style="background: #1e1e24; border: 2px solid #f39c12; border-radius: 12px; padding: 20px; width: 90%; max-width: 280px; text-align: center; color: #fff; box-shadow: 0px 4px 15px rgba(0,0,0,0.6);">
                <h3 id="modal-title" style="margin-top: 0; color: #f39c12; font-size: 1.15rem; margin-bottom: 10px;">Alert</h3>
                <p id="modal-message" style="font-size: 0.88rem; line-height: 1.4; color: #ddd; margin: 0 0 15px 0;"></p>
                <button id="modal-action-btn" style="background: #f39c12; border: none; color: #000; font-weight: bold; padding: 10px 20px; font-size: 0.95rem; border-radius: 6px; cursor: pointer; width: 100%;">Pay 5 MTC</button>
            </div>
        </div>

        <div id="hud-overlay">
            <div class="hud-top">
                <span id="hud-speed">0 m/s</span>
                <span id="hud-timer">Est: 10:00</span>
            </div>
            
            <div class="fuel-bar-container">
                <div id="fuel-bar-fill" style="width: 100%;"></div>
            </div>
        </div>
    </div>

    <div class="upgrades-container">
        <div class="upgrade-card">
            <span>Fuel Tank</span>
            <strong>LVL <span id="fuel-lvl">0</span></strong>
            <button id="fuel-upgrade-btn" onclick="upgrade('fuel')">20 MTC</button>
        </div>
        <div class="upgrade-card">
            <span>Speed</span>
            <strong>LVL <span id="speed-lvl">0</span></strong>
            <button id="speed-upgrade-btn" onclick="upgrade('speed')">20 MTC</button>
        </div>
        <div class="upgrade-card">
            <span>Engine</span>
            <strong>LVL <span id="engine-lvl">0</span></strong>
            <button id="engine-upgrade-btn" onclick="upgrade('engine')">20 MTC</button>
        </div>
    </div>

    <div class="footer-nav">
    <a href="index.html" class="nav-item active">🏠<br>Home</a>
    <a href="store.html" class="nav-item">🛒<br>Store</a>
    <a href="#" class="nav-item">👥<br>Friends</a>
    <a href="#" class="nav-item">📋<br>Tasks</a>
</div>

   <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const NGROK_URL = "https://merlin-superindifferent-karma.ngrok-free.dev"; 

        // --- STATE MANAGEMENT ---
        let balance = 70;
        let speedsLevel = 0;
        let fuelLevel = 0;
        let engineLevel = 0;

        let totalTaskDuration = 600; // 10 Minutes default
        let currentTaskTimeLeft = 600;
        let fuelPercentage = 100;
        
        let isDriving = false;
        let isFuelOut = false;
        let isEngineDead = false;
        let isFirstRunDone = 0;
        let jobWaitingApproval = false;

        let secondsWorkedThisJob = 0;

        let tutorialFuelOutagesOccurred = 0;
        let tutorialEngineFailuresOccurred = 0;

        let gameInterval = null;
        let taskStartTime = 0;

        // --- CACHED DOM NODES ---
        const usernameElement = document.getElementById('username');
        const videoEl = document.getElementById('road-video');
        const stagnantEl = document.getElementById('stagnant-truck');
        const speedHud = document.getElementById('hud-speed');
        const timerHud = document.getElementById('hud-timer');
        const fuelFill = document.getElementById('fuel-bar-fill');
        const balanceTextElement = document.getElementById('balance-display');
        const jobBoardOverlay = document.getElementById('job-board-overlay');

        const fuelLvlTxt = document.getElementById('fuel-lvl');
        const speedLvlTxt = document.getElementById('speed-lvl');
        const engineLvlTxt = document.getElementById('engine-lvl');

        const fuelBtn = document.getElementById('fuel-upgrade-btn');
        const speedBtn = document.getElementById('speed-upgrade-btn');
        const engineBtn = document.getElementById('engine-upgrade-btn');

        // --- UTILITIES ---
        // Formatting helper that handles 12-character limit truncation safely
        function formatUsername(name) {
            if (!name) return "Driver";
            let rawName = name.startsWith('@') ? name.substring(1) : name;
            if (rawName.length > 12) {
                return `@${rawName.substring(0, 12)}...`;
            }
            return `@${rawName}`;
        }

       if (usernameElement && tg.initDataUnsafe?.user) {
            const user = tg.initDataUnsafe.user;
            const displayName = user.username || user.first_name || "Driver";
            usernameElement.innerText = formatUsername(displayName);

            // 🌟 SAVE TO STORAGE SO THE STORE PAGE CAN ACCESS IT!
            sessionStorage.setItem('tg_user_id', user.id);
            sessionStorage.setItem('tg_username', displayName);
        } else {
            // Local testing fallback values
            sessionStorage.setItem('tg_user_id', '12345');
            sessionStorage.setItem('tg_username', 'Driver');
        }

       function syncPriceButtonLabels(fCost, sCost, eCost) {
            if (fuelBtn) fuelBtn.innerText = `${fCost} MTC`;
            if (speedBtn) speedBtn.innerText = `${sCost} MTC`;
            if (engineBtn) engineBtn.innerText = `${eCost} MTC`;
        }
        function openAppModal(title, message, btnText, actionCallback) {
            const modalEl = document.getElementById('game-modal');
            const titleEl = document.getElementById('modal-title');
            const msgEl = document.getElementById('modal-message');
            const actionBtn = document.getElementById('modal-action-btn');

            if (!modalEl) return;
            titleEl.innerText = title;
            msgEl.innerText = message;
            actionBtn.innerText = btnText;
            modalEl.style.display = 'flex';

            actionBtn.onclick = function() {
                modalEl.style.display = 'none';
                actionCallback();
            };
        }

        // --- VISUAL ROUTINE CONTROL ---
        function updateGameLoopView() {
            if (speedsLevel > 0 && fuelLevel > 0 && engineLevel > 0 && !isFuelOut && !isEngineDead && !jobWaitingApproval) {
                if (!isDriving) {
                    isDriving = true;
                    if (stagnantEl) stagnantEl.style.display = 'none';
                    if (jobBoardOverlay) jobBoardOverlay.style.display = 'none';
                    if (videoEl) {
                        videoEl.style.display = 'block';
                        videoEl.play().catch(e => console.log("Autoplay pending"));
                    }
                    
                    if (taskStartTime === 0) {
                        const userId = tg.initDataUnsafe.user?.id || 12345;
                        fetch(`${NGROK_URL}/start_task`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ user_id: userId })
                        })
                        .then(res => res.json())
                        .then(data => { 
                            if(data.status === "success") {
                                taskStartTime = data.task_start_time;
                            } 
                        });
                    }
                    startCoreTimers();
                }
                if (speedHud) speedHud.innerText = `${20 + (speedsLevel * 10)} m/s`;
            } else {
                isDriving = false;
                if (videoEl) {
                    videoEl.style.display = 'none';
                    videoEl.pause();
                }
                if (stagnantEl) stagnantEl.style.display = 'block';
                if (jobWaitingApproval && jobBoardOverlay) {
                    jobBoardOverlay.style.display = 'flex';
                }
                clearInterval(gameInterval);
                if (speedHud) speedHud.innerText = `0 m/s`;
            }
        }

        // --- CLOCK TICK LOOP (FIXED DECREMENT SYSTEM) ---
        function startCoreTimers() {
            clearInterval(gameInterval);
            
            gameInterval = setInterval(() => {
                if (!isDriving || isFuelOut || isEngineDead || jobWaitingApproval) {
                    clearInterval(gameInterval);
                    return;
                }

                currentTaskTimeLeft--;
                secondsWorkedThisJob++;

                let fuelBurnRate = 0.5 / fuelLevel; 
                fuelPercentage = 100 - (secondsWorkedThisJob * fuelBurnRate);

                if (isFirstRunDone === 0 && tutorialFuelOutagesOccurred >= 1) {
                    fuelPercentage = 40; 
                }

                if (fuelPercentage <= 0) {
                    fuelPercentage = 0;
                    if (fuelFill) fuelFill.style.width = `0%`;
                    triggerFuelOutage();
                    return;
                }
                if (fuelFill) fuelFill.style.width = `${fuelPercentage}%`;

                // FIXED: Decreased base breakdown rate significantly (0.008 -> 0.003)
                let breakdownChance = 0.003 / engineLevel;
                if (isFirstRunDone === 0 && tutorialEngineFailuresOccurred >= 1) {
                    breakdownChance = 0;
                }

                if (Math.random() < breakdownChance) {
                    triggerEngineBreakdown();
                    return;
                }

                if (currentTaskTimeLeft <= 0) {
                    currentTaskTimeLeft = 0;
                    isDriving = false;
                    jobWaitingApproval = true; 
                    clearInterval(gameInterval);
                    
                    const userId = tg.initDataUnsafe.user?.id || 12345;
                    fetch(`${NGROK_URL}/complete_task`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ user_id: userId })
                    })
                    .then(res => res.json())
                    .then(data => {
                        if(data.status === "success") {
                            balance = data.new_balance;
                            if (balanceTextElement) balanceTextElement.innerText = `${balance} MTC`;
                            isFirstRunDone = 1;
                            taskStartTime = 0;
                            secondsWorkedThisJob = 0;
                            
                            totalTaskDuration = 1200; 
                            currentTaskTimeLeft = 1200;
                            
                            tg.showAlert("Task Finished! Your delivery run earned you 50 MTC.");
                            updateGameLoopView(); 
                        }
                    });
                    return;
                }
                
                let minutes = Math.floor(currentTaskTimeLeft / 60);
                let seconds = currentTaskTimeLeft % 60;
                if (timerHud) timerHud.innerText = `Est: ${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;

            }, 1000);
        }

        function acceptNewJobContract() {
            jobWaitingApproval = false;
            if (jobBoardOverlay) jobBoardOverlay.style.display = 'none';
            updateGameLoopView();
        }

        function triggerFuelOutage() {
            isFuelOut = true;
            updateGameLoopView();
            tutorialFuelOutagesOccurred++;
            
            openAppModal(
                "Out of Fuel!", 
                "You're out of fuel. Buy some to continue the journey.", 
                "Pay 5 MTC", 
                () => processQuickFix('fuel')
            );
        }

        // FIXED: Now triggers the custom Modal dialog cleanly
        function triggerEngineBreakdown() {
            isEngineDead = true;
            updateGameLoopView();
            tutorialEngineFailuresOccurred++;
            
            openAppModal(
                "Engine Failure!", 
                "Oops! Looks like the engine died, let's fix it.", 
                "Pay 5 MTC", 
                () => processQuickFix('engine')
            );
        }

        function processQuickFix(type) {
            const userId = tg.initDataUnsafe.user?.id || 12345;
            
            fetch(`${NGROK_URL}/deduct_fix`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: userId })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === "success") {
                    balance = data.new_balance;
                    if (balanceTextElement) balanceTextElement.innerText = `${balance} MTC`;
                    
                    if (type === 'fuel') {
                        isFuelOut = false;
                        secondsWorkedThisJob = 0; 
                        fuelPercentage = 100;
                        if (fuelFill) fuelFill.style.width = `100%`;
                    }
                    if (type === 'engine') {
                        isEngineDead = false;
                    }
                    
                    // 🟩 CHANGED: Changed restoration success confirmation to use our in-app stage modal overlay
                    openAppModal("System Restored", "Your truck has been fully operationalized! Keep moving.", "Continue", () => {
                        updateGameLoopView(); 
                    });
                } else {
                    // If deduction fails due to insufficient funds, show warning and loop back to roadblock
                    openAppModal("Transaction Denied", data.message, "Try Again", () => {
                        if (type === 'fuel') triggerFuelOutage();
                        if (type === 'engine') triggerEngineBreakdown();
                    });
                }
            });
        }
        
        function loadUserData() {
            const userId = tg.initDataUnsafe.user?.id || 12345;

            fetch(`${NGROK_URL}/get_profile`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: userId })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === "success") {
                    balance = data.balance;
                    fuelLevel = data.fuel_lvl;
                    speedsLevel = data.speed_lvl;
                    engineLevel = data.engine_lvl;
                    taskStartTime = data.task_start_time;
                    isFirstRunDone = data.is_first_run_done;

                    if (balanceTextElement) balanceTextElement.innerText = `${balance} MTC`;
                    if (fuelLvlTxt) fuelLvlTxt.innerText = fuelLevel;
                    if (speedLvlTxt) speedLvlTxt.innerText = speedsLevel;
                    if (engineLvlTxt) engineLvlTxt.innerText = engineLevel;

                    syncPriceButtonLabels(data.fuel_cost, data.speed_cost, data.engine_cost);

                    if (isFirstRunDone === 1) {
                        totalTaskDuration = 1200; 
                        currentTaskTimeLeft = 1200;
                    } else {
                        totalTaskDuration = 600;
                        currentTaskTimeLeft = 600;
                    }

                    if (taskStartTime > 0 && fuelLevel > 0) {
                        let nowInSeconds = Math.floor(Date.now() / 1000);
                        let secondsPassed = nowInSeconds - Math.floor(taskStartTime);
                        currentTaskTimeLeft = totalTaskDuration - secondsPassed;
                        secondsWorkedThisJob = secondsPassed;
                        
                        if (currentTaskTimeLeft <= 0) {
                            currentTaskTimeLeft = 0;
                            taskStartTime = 0;
                            secondsWorkedThisJob = 0;
                        }
                    }
                    updateGameLoopView();
                }
            });
        }

       function upgrade(statName) {
            const userId = tg.initDataUnsafe.user?.id || 12345;
            
            fetch(`${NGROK_URL}/upgrade`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: userId, stat: statName })
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === "success") {
                    // 🟩 CHANGED: Changed upgrade success announcement to use our local stage modal overlay
                    openAppModal("Upgrade Complete!", data.message, "Awesome", () => {
                        if (statName === 'fuel') { fuelLevel++; if(fuelLvlTxt) fuelLvlTxt.innerText = fuelLevel; }
                        if (statName === 'speed') { speedsLevel++; if(speedLvlTxt) speedLvlTxt.innerText = speedsLevel; }
                        if (statName === 'engine') { engineLevel++; if(engineLvlTxt) engineLvlTxt.innerText = engineLevel; }

                        balance = data.new_balance;
                        if (balanceTextElement) balanceTextElement.innerText = `${balance} MTC`;

                        syncPriceButtonLabels(data.fuel_cost, data.speed_cost, data.engine_cost);
                        updateGameLoopView();
                    });
                } else {
                    // 🟩 CHANGED: Replaced progression locks and fund warnings to use local stage modal overlay
                    openAppModal("Upgrade Locked", data.message, "Understood", () => {
                        updateGameLoopView();
                    });
                }
            })
            .catch(err => {
                openAppModal("Connection Error", "Could not synchronize with engine node.", "Retry", () => {});
            });
        }
        loadUserData();
</script>
</body>
</html>
