<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Driver Wallet</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- 🌟 INCLUDE THE OFFICIAL PAYPAL SDK (Replace YOUR_SANDBOX_CLIENT_ID) -->
    <script src="https://www.paypal.com/sdk/js?client-id=AWQaOL9MYXfmsJoDnu_Dvtd6ZADjt7w50peJlCfW53Nm_rIegtxGr5pfw3ej6iIvnsWeJfnAJOYjQdEB&currency=USD"></script>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #1a1a1a;
            --text-main: #ffffff;
            --accent-gold: #ffcc00;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            box-sizing: border-box;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: linear-gradient(to bottom, #111, transparent);
        }
        .balance { color: var(--accent-gold); font-weight: bold; font-size: 1.1em; }
        .container { padding: 20px; margin-bottom: 80px; }
        .title { font-size: 1.4rem; margin-bottom: 5px; font-weight: bold; }
        .subtitle { font-size: 0.85rem; color: #888; margin-bottom: 25px; }
        .section-card {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid #333;
            padding: 20px;
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 1.1rem;
            margin-top: 0;
            margin-bottom: 15px;
            color: #f39c12;
        }
        .form-group { margin-bottom: 15px; }
        .form-label { display: block; font-size: 0.8rem; color: #ccc; margin-bottom: 6px; }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-symbol { position: absolute; left: 12px; color: #888; font-weight: bold; }
        .form-input {
            width: 100%;
            background: #111;
            border: 1px solid #444;
            border-radius: 8px;
            color: #fff;
            padding: 12px 12px 12px 28px;
            font-size: 1.1rem;
            box-sizing: border-box;
            font-weight: bold;
        }
        .conversion-preview {
            background: rgba(243, 156, 18, 0.1);
            border-left: 3px solid #f39c12;
            padding: 10px 15px;
            border-radius: 0 8px 8px 0;
            font-size: 0.85rem;
            margin-bottom: 20px;
        }
        /* Container for the real PayPal smart buttons */
        #paypal-button-container {
            margin-top: 20px;
        }
        .footer-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            background: #111;
            padding: 15px 0;
            border-top: 1px solid #333;
            z-index: 1000;
        }
        .nav-item { color: #666; text-decoration: none; font-size: 0.7rem; text-align: center; }
    </style>
</head>
<body>

<div class="header">
    <div><span style="font-weight: bold; font-size: 1.1rem;">Driver Wallet</span></div>
    <div>
        <span class="balance" id="balance-display" style="background: #23232e; padding: 6px 12px; border-radius: 20px; border: 1px solid #f39c12; font-weight: bold; font-size: 0.9rem; color: #fff;">0 MTC</span>
    </div>
</div>

<div class="container">
    <div class="title">Transactions Terminal</div>
    <div class="subtitle">Real PayPal Sandbox Integration</div>

    <div class="section-card">
        <div class="section-title">📥 Top Up Account</div>
        
        <div class="form-group">
            <label class="form-label">Amount in USD (Minimum $0.10)</label>
            <div class="input-wrapper">
                <span class="input-symbol">$</span>
                <input id="usd-amount" type="number" step="0.10" value="1.00" class="form-input" oninput="calculateMTC()">
            </div>
        </div>

        <div class="conversion-preview">
            Exchange Rate: <strong>$1.00 = 100 MTC</strong><br>
            You will receive: <strong id="mtc-preview">100 MTC</strong>
        </div>

        <!-- 🌟 THE OFFICIAL SMART BUTTON WILL RENDER HERE -->
        <div id="paypal-button-container"></div>
    </div>
</div>

<div class="footer-nav">
    <a href="index.html" class="nav-item">🏠<br>Home</a>
    <a href="store.html" class="nav-item">🛒<br>Store</a>
    <a href="tasks.html" class="nav-item">📋<br>Tasks</a>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const NGROK_URL = "https://merlin-superindifferent-karma.ngrok-free.dev";
    let balance = 0;

    function calculateMTC() {
        const usdInput = document.getElementById('usd-amount').value;
        const mtcPreview = document.getElementById('mtc-preview');
        if (!usdInput || isNaN(usdInput) || parseFloat(usdInput) <= 0) {
            mtcPreview.innerText = "0 MTC";
            return 0;
        }
        const mtcEquivalent = Math.round(parseFloat(usdInput) * 100);
        mtcPreview.innerText = `${mtcEquivalent} MTC`;
        return parseFloat(usdInput);
    }

    // 🌟 RENDER THE LIVE PAYPAL BUTTONS
    paypal.Buttons({
        // 1. Set up the transaction details when button is clicked
        createOrder: function(data, actions) {
            const amount = calculateMTC();
            if (amount < 0.10) {
                alert("Minimum deposit is $0.10");
                return false;
            }
            return actions.order.create({
                purchase_units: [{
                    amount: {
                        value: amount.toFixed(2)
                    },
                    description: "Money Trucks MTC Coin Topup"
                }]
            });
        },
        
        // 2. Triggered when user authorizes payment inside the popup frame
        onApprove: function(data, actions) {
            return actions.order.capture().then(function(details) {
                const userId = tg.initDataUnsafe.user?.id || 12345;
                const paidAmount = parseFloat(details.purchase_units[0].amount.value);

                // 3. Inform your backend to save the data securely
                return fetch(`${NGROK_URL}/deposit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: userId,
                        amount_usd: paidAmount,
                        order_id: data.orderID // Keep tracking id
                    })
                })
                .then(res => res.json())
                .then(serverData => {
                    if (serverData.status === "success") {
                        document.getElementById('balance-display').innerText = `${serverData.new_balance} MTC`;
                        
                        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                        
                        tg.showPopup({
                            title: "Deposit Successful!",
                            message: `Thank you! $${paidAmount.toFixed(2)} was debited. Your profile has been credited with ${Math.round(paidAmount * 100)} MTC.`,
                            buttons: [{id: "ok", type: "ok"}]
                        });
                    }
                });
            });
        },

        onError: function(err) {
            console.error("PayPal Error:", err);
            alert("Something went wrong with the PayPal frame authentication.");
        }
    }).render('#paypal-button-container');

    function fetchBalance() {
        const userId = tg.initDataUnsafe.user?.id || 12345;
        fetch(`${NGROK_URL}/get_profile`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_id: userId })
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === "success") {
                document.getElementById('balance-display').innerText = `${data.balance} MTC`;
            }
        });
    }

    fetchBalance();
</script>
</body>
</html>
