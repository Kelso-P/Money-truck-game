<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Driver Wallet</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #1a1a1a;
            --text-main: #ffffff;
            --accent-gold: #ffcc00;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            box-sizing: border-box;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: linear-gradient(to bottom, #111, transparent);
        }
        .balance { color: var(--accent-gold); font-weight: bold; font-size: 1.1em; }
        .container { padding: 20px; margin-bottom: 80px; }
        .title { font-size: 1.4rem; margin-bottom: 5px; font-weight: bold; }
        .subtitle { font-size: 0.85rem; color: #888; margin-bottom: 25px; }
        .section-card {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid #333;
            padding: 20px;
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 1.1rem;
            margin-top: 0;
            margin-bottom: 15px;
            color: #f39c12;
        }
        .form-group { margin-bottom: 15px; }
        .form-label { display: block; font-size: 0.8rem; color: #ccc; margin-bottom: 6px; }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-symbol { position: absolute; left: 12px; color: #888; font-weight: bold; }
        .form-input {
            width: 100%;
            background: #111;
            border: 1px solid #444;
            border-radius: 8px;
            color: #fff;
            padding: 12px 12px 12px 28px;
            font-size: 1.1rem;
            box-sizing: border-box;
            font-weight: bold;
        }
        .conversion-preview {
            background: rgba(243, 156, 18, 0.1);
            border-left: 3px solid #f39c12;
            padding: 10px 15px;
            border-radius: 0 8px 8px 0;
            font-size: 0.85rem;
            margin-bottom: 20px;
        }
        .footer-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            background: #111;
            padding: 15px 0;
            border-top: 1px solid #333;
            z-index: 1000;
        }
        .nav-item { color: #666; text-decoration: none; font-size: 0.7rem; text-align: center; }
    </style>
</head>
<body>

<div class="header">
   <div class="user-profile"> <span id="username-display">Driver</span>!
</div>
        <span class="balance" id="balance-display" style="background: #23232e; padding: 6px 12px; border-radius: 20px; border: 1px solid #f39c12; font-weight: bold; font-size: 0.9rem; color: #fff;">0 MTC</span>
    </div>
</div>

<div class="container">
    <div class="title">Transactions Terminal</div>
    <div class="subtitle">Real PayPal Sandbox Integration</div>

    <!-- 📥 TOP UP SECTION -->
    <div class="section-card">
        <div class="section-title">📥 Top Up Account</div>
        
        <div class="form-group">
            <label class="form-label">Amount in USD (Minimum $0.10)</label>
            <div class="input-wrapper">
                <span class="input-symbol">$</span>
                <input id="usd-amount" type="number" step="0.10" value="1.00" class="form-input" oninput="calculateMTC()">
            </div>
        </div>

        <div class="conversion-preview">
            Exchange Rate: <strong>$1.00 = 100 MTC</strong><br>
            You will receive: <strong id="mtc-preview">100 MTC</strong>
        </div>

        <button id="custom-checkout-btn" class="form-btn" onclick="startDirectCheckout()" style="background: #0070ba; color: #fff; width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">
            Pay with PayPal
        </button>
    </div>

    <!-- 📤 WITHDRAW SECTION -->
    <div class="section-card">
        <div class="section-title">📤 Request Withdrawal</div>
        
        <div class="form-group">
            <label class="form-label">PayPal Email Address</label>
            <div class="input-wrapper" style="display: block;">
                <input id="withdraw-email" type="email" placeholder="your-email@example.com" class="form-input" style="padding-left: 12px;">
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Amount to Withdraw (Minimum 500 MTC)</label>
            <div class="input-wrapper">
                <span class="input-symbol" style="left: 10px; font-size: 0.85rem; color: #f39c12;">MTC</span>
                <input id="withdraw-amount" type="number" step="100" value="500" class="form-input" style="padding-left: 45px;" oninput="calculateUSDWithdrawal()">
            </div>
        </div>

        <div class="conversion-preview" style="background: rgba(46, 204, 113, 0.1); border-left: 3px solid #2ecc71;">
            Conversion Value: <strong>100 MTC = $1.00</strong><br>
            You will receive roughly: <strong id="usd-withdraw-preview">$5.00 USD</strong>
        </div>

        <button id="custom-withdraw-btn" class="form-btn" onclick="submitWithdrawal()" style="background: #2ecc71; color: #fff; width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">
            Confirm Withdrawal Request
        </button>
    </div>

</div>

<div class="footer-nav">
    <a href="index.html" class="nav-item">🏠<br>Home</a>
    <a href="store.html" class="nav-item">🛒<br>Store</a>
    <a href="tasks.html" class="nav-item">📋<br>Tasks</a>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const NGROK_URL = "https://merlin-superindifferent-karma.ngrok-free.dev";
    const userId = tg.initDataUnsafe?.user?.id || 12345;
    let currentBalance = 0;

    // Helper function matching store/tasks formatting
    function formatUsername(name) {
        if (!name) return "Driver";
        let rawName = name.startsWith('@') ? name.substring(1) : name;
        if (rawName.length > 12) {
            return `@${rawName.substring(0, 12)}...`;
        }
        return `@${rawName}`;
    }

    // Dynamically extract and display the Telegram Username
    function initUserHeader() {
        const usernameDisplay = document.getElementById('username-display');
        if (usernameDisplay) {
            const displayName = tg.initDataUnsafe?.user?.username || tg.initDataUnsafe?.user?.first_name || "Driver";
            usernameDisplay.innerText = formatUsername(displayName);
        }
    }

    function calculateMTC() {
        const usdInput = document.getElementById('usd-amount').value;
        const mtcPreview = document.getElementById('mtc-preview');
        if (!usdInput || isNaN(usdInput) || parseFloat(usdInput) <= 0) {
            mtcPreview.innerText = "0 MTC";
            return 0;
        }
        const mtcEquivalent = Math.round(parseFloat(usdInput) * 100);
        mtcPreview.innerText = `${mtcEquivalent} MTC`;
        return parseFloat(usdInput);
    }

    function calculateUSDWithdrawal() {
        const mtcInput = document.getElementById('withdraw-amount').value;
        const usdPreview = document.getElementById('usd-withdraw-preview');
        if (!mtcInput || isNaN(mtcInput) || parseInt(mtcInput) <= 0) {
            usdPreview.innerText = "$0.00 USD";
            return 0;
        }
        const usdEquivalent = (parseInt(mtcInput) / 100).toFixed(2);
        usdPreview.innerText = `$${usdEquivalent} USD`;
        return parseInt(mtcInput);
    }

    // Synced balance fetcher with proper ngrok bypass headers
    function fetchBalance() {
        fetch(`${NGROK_URL}/get_profile`, {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'ngrok-skip-browser-warning': 'true' 
            },
            body: JSON.stringify({ user_id: userId })
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === "success") {
                currentBalance = data.balance;
                const balanceEl = document.getElementById('balance-display');
                if (balanceEl) {
                    balanceEl.innerText = `${data.balance} MTC`;
                }
            }
        })
        .catch(err => console.error("Error updating layout balances:", err));
    }

    function startDirectCheckout() {
        const amount = calculateMTC();
        if (amount < 0.10) {
            tg.showAlert("Minimum deposit is $0.10");
            return;
        }
        
        const button = document.getElementById('custom-checkout-btn');
        button.innerText = "Generating checkout link...";
        button.disabled = true;

        fetch(`${NGROK_URL}/create-paypal-order`, {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'ngrok-skip-browser-warning': 'true'
            },
            body: JSON.stringify({ 
                amount_usd: amount,
                user_id: userId
            })
        })
        .then(res => res.json())
        .then(data => {
            button.innerText = "Pay with PayPal";
            button.disabled = false;
            
            if (data.status === "success" && data.checkout_url) {
                if (tg.openLink) {
                    tg.openLink(data.checkout_url);
                } else {
                    window.location.href = data.checkout_url;
                }
            } else {
                tg.showAlert("Error setting up payment link: " + data.message);
            }
        })
        .catch(err => {
            button.innerText = "Pay with PayPal";
            button.disabled = false;
            console.error(err);
            tg.showAlert("Network communication error.");
        });
    }

    // New functional payout endpoint logic execution
    function submitWithdrawal() {
        const email = document.getElementById('withdraw-email').value.trim();
        const amountMTC = parseInt(document.getElementById('withdraw-amount').value);
        const button = document.getElementById('custom-withdraw-btn');

        if (!email || !email.includes('@')) {
            tg.showAlert("Please provide a valid PayPal email address.");
            return;
        }
        if (isNaN(amountMTC) || amountMTC < 500) {
            tg.showAlert("Minimum withdrawal amount is 500 MTC.");
            return;
        }
        if (amountMTC > currentBalance) {
            tg.showAlert(`Insufficient funds. Your current balance is ${currentBalance} MTC.`);
            return;
        }

        button.innerText = "Processing Request...";
        button.disabled = true;

        fetch(`${NGROK_URL}/request-withdrawal`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'ngrok-skip-browser-warning': 'true'
            },
            body: JSON.stringify({
                user_id: userId,
                paypal_email: email,
                amount_mtc: amountMTC
            })
        })
        .then(res => res.json())
        .then(data => {
            button.innerText = "Confirm Withdrawal Request";
            button.disabled = false;

            if (data.status === "success") {
                tg.showAlert(`Success! Your request to withdraw ${amountMTC} MTC has been logged.`);
                fetchBalance(); // Smoothly update UI balance counts
            } else {
                tg.showAlert("Withdrawal failed: " + data.message);
            }
        })
        .catch(err => {
            button.innerText = "Confirm Withdrawal Request";
            button.disabled = false;
            console.error(err);
            tg.showAlert("Network communication error.");
        });
    }

    // Initialize layout profiles right as the window opens
    initUserHeader();
    fetchBalance();
</script>
</body>
</html>
